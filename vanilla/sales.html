    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h1 class="page-title">Sales</h1>
          <p class="page-description">Track and manage your sales transactions</p>
        </div>
        <button class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          New Sale
        </button>
      </div>

      <!-- Search -->
      <div class="input-with-icon" style="max-width: 300px; margin-bottom: 1.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="input" id="salesSearch" placeholder="Search sales..." oninput="filterSales()">
      </div>

      <!-- Table -->
      <div class="card table-container">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Status</th>
              <th>Payment</th>
              <th class="text-right">Total</th>
              <th class="text-right">Date</th>
              <th style="width: 50px;"></th>
            </tr>
          </thead>
          <tbody id="salesTableBody">
            <!-- Sales will be inserted by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let sales = [...mockSales];

    function getStatusBadge(status) {
      const classes = {
        completed: 'badge-success',
        pending: 'badge-warning',
        cancelled: 'badge-danger'
      };
      return `<span class="badge ${classes[status]}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`;
    }

    function getPaymentBadge(method) {
      const labels = {
        card: 'Card',
        cash: 'Cash',
        transfer: 'Transfer'
      };
      return labels[method] || method;
    }

    function renderSales(salesToRender) {
      const tbody = document.getElementById('salesTableBody');
      tbody.innerHTML = '';
      
      salesToRender.forEach(sale => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="font-medium">#${sale.id.padStart(4, '0')}</td>
          <td>
            <div class="flex items-center gap-3">
              <div class="avatar avatar-primary">${getInitials(sale.customerName)}</div>
              <span>${sale.customerName}</span>
            </div>
          </td>
          <td class="text-muted">${sale.items.length} item${sale.items.length > 1 ? 's' : ''}</td>
          <td>${getStatusBadge(sale.status)}</td>
          <td class="text-muted">${getPaymentBadge(sale.paymentMethod)}</td>
          <td class="text-right font-medium">${formatCurrency(sale.total)}</td>
          <td class="text-right text-muted">${formatDate(sale.createdAt)}</td>
          <td>
            <div class="dropdown">
              <button class="btn btn-ghost" onclick="toggleDropdown(this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
              </button>
              <div class="dropdown-menu">
                <div class="dropdown-item">View Details</div>
                <div class="dropdown-item">Print Invoice</div>
                <div class="dropdown-item danger">Cancel Order</div>
              </div>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function filterSales() {
      const query = document.getElementById('salesSearch').value.toLowerCase();
      const filtered = sales.filter(s => 
        s.customerName.toLowerCase().includes(query) || 
        s.id.includes(query)
      );
      renderSales(filtered);
    }

    // Initial render
    renderSales(sales);
  </script>
</body>
</html>
