<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizBuddy - Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Store-specific styles */
    .store-container {
      min-height: 100vh;
      background: var(--background);
    }

    .store-header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .store-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .store-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .store-nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .store-nav a {
      color: rgba(255, 255, 255, 0.8);
      transition: color 0.2s;
    }

    .store-nav a:hover {
      color: white;
    }

    .cart-btn {
      position: relative;
      background: rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--accent);
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .store-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .store-hero {
      text-align: center;
      padding: 3rem 1rem;
      margin-bottom: 2rem;
    }

    .store-hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .store-hero p {
      color: var(--muted-foreground);
      font-size: 1.125rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .product-image {
      height: 200px;
      background: linear-gradient(135deg, var(--muted) 0%, var(--secondary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-foreground);
    }

    .product-info {
      padding: 1.25rem;
    }

    .product-category {
      font-size: 0.75rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .product-name {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 1rem;
    }

    .product-stock {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin-bottom: 1rem;
    }

    .product-stock.low {
      color: var(--accent);
    }

    .add-to-cart-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-to-cart-btn:hover {
      background: #5558e3;
    }

    .add-to-cart-btn:disabled {
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: not-allowed;
    }

    /* Cart Sidebar */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      display: none;
    }

    .cart-overlay.active {
      display: block;
    }

    .cart-sidebar {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      max-width: 100%;
      height: 100vh;
      background: var(--card);
      z-index: 1000;
      transition: right 0.3s;
      display: flex;
      flex-direction: column;
    }

    .cart-sidebar.active {
      right: 0;
    }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header h2 {
      font-size: 1.25rem;
    }

    .close-cart {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-image {
      width: 60px;
      height: 60px;
      background: var(--muted);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .cart-item-price {
      color: var(--muted-foreground);
      font-size: 0.875rem;
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      background: var(--background);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .checkout-btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .checkout-btn:hover {
      background: #5558e3;
    }

    .empty-cart {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted-foreground);
    }
  </style>
</head>
<body>
  <div class="store-container">
    <!-- Header -->
    <header class="store-header">
      <div class="store-logo">
        <div class="store-logo-icon">B</div>
        <h1>BizBuddy Store</h1>
      </div>
      <nav class="store-nav">
        <a href="index.html">Dashboard</a>
        <button class="cart-btn" onclick="openCart()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
          Cart
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="store-content">
      <div class="store-hero">
        <h1>Welcome to Our Store</h1>
        <p>Discover amazing products at great prices</p>
      </div>

      <div class="products-grid" id="productsGrid">
        <!-- Products will be inserted by JS -->
      </div>
    </main>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2>Shopping Cart</h2>
        <button class="close-cart" onclick="closeCart()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="cart-items" id="cartItems">
        <!-- Cart items will be inserted by JS -->
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span id="cartTotal">₹0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
      </div>
    </aside>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let cart = [];

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      mockProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        
        const stockClass = product.quantity < product.minStock ? 'low' : '';
        const stockText = product.quantity === 0 ? 'Out of Stock' : 
                         product.quantity < product.minStock ? `Only ${product.quantity} left!` :
                         `${product.quantity} in stock`;

        card.innerHTML = `
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}" width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"</img>
          </div>
          <div class="product-info">
            <div class="product-category">${product.category}</div>
            <h3 class="product-name">${product.name}</h3>
            <div class="product-price">${formatCurrency(product.price)}</div>
            <div class="product-stock ${stockClass}">${stockText}</div>
            <button class="add-to-cart-btn" onclick="addToCart('${product.id}')" ${product.quantity === 0 ? 'disabled' : ''}>
              ${product.quantity === 0 ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function addToCart(productId) {
      const product = mockProducts.find(p => p.id === productId);
      if (!product || product.quantity === 0) return;

      const existingItem = cart.find(item => item.product.id === productId);
      if (existingItem) {
        if (existingItem.quantity < product.quantity) {
          existingItem.quantity++;
        }
      } else {
        cart.push({ product, quantity: 1 });
      }

      updateCart();
      openCart();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.product.id !== productId);
      updateCart();
    }

    function updateQuantity(productId, change) {
      const item = cart.find(item => item.product.id === productId);
      if (!item) return;

      const newQty = item.quantity + change;
      if (newQty <= 0) {
        removeFromCart(productId);
      } else if (newQty <= item.product.quantity) {
        item.quantity = newQty;
        updateCart();
      }
    }

    function updateCart() {
      const countEl = document.getElementById('cartCount');
      const itemsEl = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');

      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalAmount = cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0);

      countEl.textContent = totalItems;
      totalEl.textContent = formatCurrency(totalAmount);

      if (cart.length === 0) {
        itemsEl.innerHTML = '<div class="empty-cart"><p>Your cart is empty</p></div>';
        return;
      }

      itemsEl.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-image">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/></svg>
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.product.name}</div>
            <div class="cart-item-price">${formatCurrency(item.product.price)}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="updateQuantity('${item.product.id}', -1)">-</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="updateQuantity('${item.product.id}', 1)">+</button>
          </div>
        </div>
      `).join('');
    }

    function openCart() {
      document.getElementById('cartOverlay').classList.add('active');
      document.getElementById('cartSidebar').classList.add('active');
    }

    function closeCart() {
      document.getElementById('cartOverlay').classList.remove('active');
      document.getElementById('cartSidebar').classList.remove('active');
    }

    function checkout() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      alert('Checkout functionality would go here!');
    }

    // Initial render
    renderProducts();
    updateCart();
  </script>
</body>
</html>
