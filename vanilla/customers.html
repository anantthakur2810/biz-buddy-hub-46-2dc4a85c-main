<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizBuddy - Customers</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">B</div>
        <h1>BizBuddy</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="customers.html" class="nav-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Customers</span>
        </a>
        <a href="sales.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
          <span>Sales</span>
        </a>
        <a href="inventory.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/><path d="m3.3 7 7.703 4.734a2 2 0 0 0 1.994 0L20.7 7"/><path d="m7.5 4.27 9 5.15"/></svg>
          <span>Inventory</span>
        </a>
        <a href="store.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg>
          <span>Store</span>
        </a>
        <a href="benchmarks.html" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          <span>Benchmarks</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h1 class="page-title">Customers</h1>
          <p class="page-description">Manage your customer relationships</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('addCustomerModal')">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Add Customer
        </button>
      </div>

      <!-- Search -->
      <div class="input-with-icon" style="max-width: 300px; margin-bottom: 1.5rem;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="input" id="customerSearch" placeholder="Search customers..." oninput="filterCustomers()">
      </div>

      <!-- Table -->
      <div class="card table-container">
        <table>
          <thead>
            <tr>
              <th>Customer</th>
              <th>Contact</th>
              <th>Address</th>
              <th class="text-right">Total Purchases</th>
              <th class="text-right">Joined</th>
              <th style="width: 50px;"></th>
            </tr>
          </thead>
          <tbody id="customerTableBody">
            <!-- Customers will be inserted by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Add Customer Modal -->
  <div class="modal-overlay" id="addCustomerModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add New Customer</h2>
        <p>Enter the customer's information below.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="customerName">Full Name</label>
        <input type="text" class="input" id="customerName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label class="form-label" for="customerEmail">Email</label>
        <input type="email" class="input" id="customerEmail" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="customerPhone">Phone</label>
        <input type="text" class="input" id="customerPhone" placeholder="+91 98765-43210">
      </div>
      <div class="form-group">
        <label class="form-label" for="customerAddress">Address</label>
        <input type="text" class="input" id="customerAddress" placeholder="123 Main St, City">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addCustomerModal')">Cancel</button>
        <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script>
    let customers = [...mockCustomers];

    function renderCustomers(customersToRender) {
      const tbody = document.getElementById('customerTableBody');
      tbody.innerHTML = '';
      
      customersToRender.forEach(customer => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>
            <div class="flex items-center gap-3">
              <div class="avatar avatar-primary">${getInitials(customer.name)}</div>
              <span class="font-medium">${customer.name}</span>
            </div>
          </td>
          <td>
            <div class="contact-info">
              <div class="contact-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                ${customer.email}
              </div>
              <div class="contact-item text-muted">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                ${customer.phone}
              </div>
            </div>
          </td>
          <td class="text-muted">${customer.address}</td>
          <td class="text-right font-medium">${formatCurrency(customer.totalPurchases)}</td>
          <td class="text-right text-muted">${formatDate(customer.createdAt)}</td>
          <td>
            <div class="dropdown">
              <button class="btn btn-ghost" onclick="toggleDropdown(this)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
              </button>
              <div class="dropdown-menu">
                <div class="dropdown-item">View Details</div>
                <div class="dropdown-item">Edit</div>
                <div class="dropdown-item danger">Delete</div>
              </div>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function filterCustomers() {
      const query = document.getElementById('customerSearch').value.toLowerCase();
      const filtered = customers.filter(c => 
        c.name.toLowerCase().includes(query) || 
        c.email.toLowerCase().includes(query)
      );
      renderCustomers(filtered);
    }

    function addCustomer() {
      const name = document.getElementById('customerName').value;
      const email = document.getElementById('customerEmail').value;
      const phone = document.getElementById('customerPhone').value;
      const address = document.getElementById('customerAddress').value;

      if (!name || !email) {
        alert('Please fill in name and email');
        return;
      }

      const newCustomer = {
        id: Date.now().toString(),
        name,
        email,
        phone,
        address,
        createdAt: new Date(),
        totalPurchases: 0
      };

      customers.unshift(newCustomer);
      renderCustomers(customers);
      closeModal('addCustomerModal');
      
      // Clear form
      document.getElementById('customerName').value = '';
      document.getElementById('customerEmail').value = '';
      document.getElementById('customerPhone').value = '';
      document.getElementById('customerAddress').value = '';
    }

    // Initial render
    renderCustomers(customers);
  </script>
</body>
</html>
